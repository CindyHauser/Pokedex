<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link rel="shortcut icon" href="./img/pokeball.png" type="image/x-icon">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/dialog.css">
    <link rel="stylesheet" href="./styles/colors.css">
    <link rel="stylesheet" href="./styles/media.css">

    <script src="./scripts/templates.js"></script>
    <script src="./script.js"></script>

    <!-- Bootstrap files
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script> -->

</head>

<body onload="init()">

    <header class="header_main">
        <div class="content_stopper_header">
            <article class="header_style">
                <div class="pokedex_pokeball">
                    <img class="pokeball" src="./img/pokeball.png" alt="Pokeball">
                    <h1>Pokedex</h1>
                </div>
                <div>
                    <div>
                        <input class="input_pokemon" id="inputPokemon" type="text"
                            placeholder="pokemon...(min 3 letters)">
                        <button class="btn_search_reset" onclick="searchPokemon()">search</button>
                        <button class="btn_search_reset" onclick="resetWebsite()">reset</button>
                    </div>
                    <p id="tooShort"></p>
                </div>

            </article>
        </div>
    </header>

    <main class="main_content">
        <div id="loader" class="d_none">
            <img class="spinner" src="./img/pokeball.png" alt="Loading...">
        </div>

        <div class="content_stopper" id="mainContent">

        </div>

        <div class="button_middle">
            <button id="next20Btn" class="next_20_button" onclick="showNext20()">Next 20</button>
        </div>

    </main>

    <dialog id="dialog_window" onclick="toggleDialog()">
        <section onclick="stopPropagationFunction(event)" id="dialogContent">

        </section>
    </dialog>

    <footer class="footer_main">
        <p>&copy; 2026 Cindy Hauser</p>
    </footer>

</body>
<script src="./scripts/dialog.js"></script>

</html>
