<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/dialog.css">
    <link rel="stylesheet" href="./styles/colors.css">

    <script src="./scripts/templates.js"></script>
    <script src="./script.js"></script>

</head>

<body onload="init()">

    <header class="header_main">
        <div class="content_stopper_header">
            <article class="header_style">
                <h1>Pokedex</h1>
                <div>
                    <input id="inputPokemon" type="text" placeholder="pokemon...(min 3 letters)">
                    <button onclick="searchPokemon()">search</button>
                </div>
            </article>
        </div>
    </header>

    <main class="main_content">
        <div class="content_stopper" id="mainContent">

        </div>

        <div class="button_middle">
            <button class="next_20_button" onclick="showNext20()">Next 20</button>
        </div>

    </main>

    <dialog id="dialog_window" onclick="toggleDialog()">
        <section onclick="stopPropagationFunction(event)" class="dialog_style" id="dialogContent">

        </section>
    </dialog>

    <footer class="footer_main">
        <p>&copy; 2026 Cindy Hauser</p>
    </footer>

</body>
<script src="./scripts/dialog.js"></script>

</html>
